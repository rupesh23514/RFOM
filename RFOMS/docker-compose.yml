version: "3"

services:

  backend:
    build: ./food-ordering-backend
    env_file:
      - ./food-ordering-backend/.env
    ports:
      - "5000:5000"
    restart: always
    depends_on:
      - mongo

  frontend:
    build: ./food-ordering-frontend
    ports:
      - "3000:3000"
    restart: always

  mongo:
    image: mongo
    container_name: mongodb
    ports:
      - "27017:27017"
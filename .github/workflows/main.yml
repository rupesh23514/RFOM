name: RFOM CI/CD

on:
  push:
    branches: [ main ]

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION }}

    - name: Login to ECR
      run: |
        aws ecr get-login-password --region $AWS_REGION | \
        docker login --username AWS --password-stdin $ECR_REGISTRY

    - name: Build Backend
      run: |
        docker build -t rfoms-backend ./food-ordering-backend
        docker tag rfoms-backend:latest $ECR_REGISTRY/rfoms-backend:latest

    - name: Build Frontend
      run: |
        docker build -t rfoms-frontend ./food-ordering-frontend
        docker tag rfoms-frontend:latest $ECR_REGISTRY/rfoms-frontend:latest

    - name: Push Backend
      run: docker push $ECR_REGISTRY/rfoms-backend:latest

    - name: Push Frontend
      run: docker push $ECR_REGISTRY/rfoms-frontend:latest

    - name: Deploy to EC2
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          docker pull $ECR_REGISTRY/rfoms-backend:latest
          docker pull $ECR_REGISTRY/rfoms-frontend:latest

          docker stop rfoms-backend rfoms-frontend || true
          docker rm rfoms-backend rfoms-frontend || true

          docker run -d -p 5000:5000 \
          -e MONGO_URI=mongodb://mongodb:27017/rfom \
          --name rfoms-backend \
          $ECR_REGISTRY/rfoms-backend:latest

          docker run -d -p 5173:5173 \
          --name rfoms-frontend \
          $ECR_REGISTRY/rfoms-frontend:latest
